name: Security Regression Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  security-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run security regression tests
        env:
          DURO_AGENT_HOME: ${{ runner.temp }}/duro-agent-home
        working-directory: src
        run: python test_security_immutability.py
        shell: bash

  # Ensure this workflow is a required check for branch protection
  security-gate:
    needs: security-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check security tests passed
        run: |
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "Security tests failed or were skipped"
            exit 1
          fi
          echo "All security tests passed"
