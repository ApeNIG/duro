name: Security Regression Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Secret scanning - runs first, fast fail if secrets detected
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for enterprise features

      - name: Scan result
        if: always()
        run: |
          if [ "${{ job.status }}" == "failure" ]; then
            echo "::error::Secrets detected in repository! Review and remove before merging."
            exit 1
          fi
          echo "No secrets detected"

  security-tests:
    needs: secret-scan  # Don't run tests if secrets are found
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run security regression tests
        env:
          DURO_AGENT_HOME: ${{ runner.temp }}/duro-agent-home
          # Disable provenance requirement for immutability tests (they test other security aspects)
          DURO_PROVENANCE_REQUIRED: "0"
        working-directory: src
        run: python test_security_immutability.py
        shell: bash

      - name: Run provenance signing tests
        working-directory: src
        # Test is self-contained: sets DURO_PROVENANCE_HMAC_KEYS dynamically in setup
        run: python test_provenance_signing.py
        shell: bash

      - name: Run gate redaction tests
        run: python -m pytest tests/test_gate_redaction.py -v
        shell: bash

  # Ensure this workflow is a required check for branch protection
  security-gate:
    needs: security-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check security tests passed
        run: |
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "Security tests failed or were skipped"
            exit 1
          fi
          echo "All security tests passed"
